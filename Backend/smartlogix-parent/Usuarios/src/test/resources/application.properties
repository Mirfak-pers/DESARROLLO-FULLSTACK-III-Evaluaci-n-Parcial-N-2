spring.application.name=ms-usuarios-test
 
# Base de datos H2 en memoria (se crea y destruye con cada test)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
 
# Hibernate recrea el esquema para cada test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
# Desactiva la importación del .env (no existe en entorno de test)
spring.config.import=
