# Nombre del microservicio
spring.application.name=ms-usuarios

# Puerto del microservicio Usuarios
# Inventario usa 8081, por eso Usuarios usa 8084
server.port=8084

# Cargar variables desde el archivo .env
spring.config.import=optional:file:.env[.properties]

# Configuración de Base de Datos MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST_USUARIOS:localhost}:${DB_PORT_USUARIOS:3306}/${DB_NAME_USUARIOS:db_smartlogix_usuarios}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER_USUARIOS:root}
spring.datasource.password=${DB_PASS_USUARIOS:}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true