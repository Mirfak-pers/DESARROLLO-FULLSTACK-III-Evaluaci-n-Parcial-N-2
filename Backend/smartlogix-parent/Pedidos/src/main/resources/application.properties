spring.application.name=msPedidos
server.port=8082

# ===============================
# BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST_PEDIDOS:localhost}:${DB_PORT_PEDIDOS:3306}/${DB_NAME_PEDIDOS:db_smartlogix_pedidos}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER_PEDIDOS:root}
spring.datasource.password=${DB_PASS_PEDIDOS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# MICROSERVICIO INVENTARIO
# ===============================
servicios.inventario.url=${INVENTARIO_URL:http://localhost:8081/api/inventario/productos}

# ===============================
# MICROSERVICIO ENVIOS  ← NUEVO
# ===============================
servicios.envios.url=${ENVIOS_URL:http://localhost:8083/api/envios}

# ===============================
# ACTUATOR + CIRCUIT BREAKER
# ===============================
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.smartlogix=DEBUG
logging.file.name=logs/msPedidos.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ===============================
# KEYCLOAK / OAuth2 Resource Server
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080/realms/smartlogix}

# ===============================
# RESILIENCE4J - CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.slidingWindowSize=5
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.inventarioCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.timelimiter.instances.inventarioCircuitBreaker.timeoutDuration=3s