spring.application.name=msPedidos
server.port=8082

# ===============================
# BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST_PEDIDOS:localhost}:${DB_PORT_PEDIDOS:3306}/${DB_NAME_PEDIDOS:db_smartlogix_pedidos}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER_PEDIDOS:root}
spring.datasource.password=${DB_PASS_PEDIDOS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# MICROSERVICIO INVENTARIO
# ===============================
servicios.inventario.url=${INVENTARIO_URL:http://localhost:8081/api/inventario/productos}

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.smartlogix=DEBUG

logging.file.name=logs/msPedidos.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}