services:

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: smartlogix-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  eureka:
    build: ./Backend/smartlogix-parent/Eureka
    container_name: smartlogix-eureka
    ports:
      - "8761:8761"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  mysql-inventario:
    image: mysql:8.0
    container_name: smartlogix-mysql-inventario
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartlogix_inventario
    ports:
      - "3307:3306"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-pedidos:
    image: mysql:8.0
    container_name: smartlogix-mysql-pedidos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_smartlogix_pedidos
    ports:
      - "3308:3306"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-envios:
    image: mysql:8.0
    container_name: smartlogix-mysql-envios
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_smartlogix_envios
    ports:
      - "3309:3306"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-usuarios:
    image: mysql:8.0
    container_name: smartlogix-mysql-usuarios
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_smartlogix_usuarios
    ports:
      - "3310:3306"
    networks:
      - smartlogix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  ms-inventario:
    build: ./Backend/smartlogix-parent/Inventario
    container_name: smartlogix-inventario
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=mysql-inventario
      - DB_PORT=3306
      - DB_NAME=smartlogix_inventario
      - DB_USER=root
      - DB_PASSWORD=root
      - EUREKA_URL=http://eureka:8761/eureka/
      - KEYCLOAK_URL=http://keycloak:8080/realms/smartlogix
    depends_on:
      mysql-inventario:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - smartlogix-net

  ms-pedidos:
    build: ./Backend/smartlogix-parent/Pedidos
    container_name: smartlogix-pedidos
    ports:
      - "8082:8082"
    environment:
      - DB_HOST_PEDIDOS=mysql-pedidos
      - DB_PORT_PEDIDOS=3306
      - DB_NAME_PEDIDOS=db_smartlogix_pedidos
      - DB_USER_PEDIDOS=root
      - DB_PASS_PEDIDOS=root
      - INVENTARIO_URL=http://ms-inventario:8081/api/inventario/productos
      - EUREKA_URL=http://eureka:8761/eureka/
      - KEYCLOAK_URL=http://keycloak:8080/realms/smartlogix
    depends_on:
      mysql-pedidos:
        condition: service_healthy
      eureka:
        condition: service_healthy
      ms-inventario:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - smartlogix-net

  ms-envios:
    build: ./Backend/smartlogix-parent/msEnvios
    container_name: smartlogix-envios
    ports:
      - "8083:8083"
    environment:
      - DB_HOST_ENVIOS=mysql-envios
      - DB_PORT_ENVIOS=3306
      - DB_NAME_ENVIOS=db_smartlogix_envios
      - DB_USER_ENVIOS=root
      - DB_PASS_ENVIOS=root
      - EUREKA_URL=http://eureka:8761/eureka/
      - KEYCLOAK_URL=http://keycloak:8080/realms/smartlogix
    depends_on:
      mysql-envios:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - smartlogix-net

  ms-usuarios:
    build: ./Backend/smartlogix-parent/Usuarios
    container_name: smartlogix-usuarios
    ports:
      - "8084:8084"
    environment:
      - DB_HOST_USUARIOS=mysql-usuarios
      - DB_PORT_USUARIOS=3306
      - DB_NAME_USUARIOS=db_smartlogix_usuarios
      - DB_USER_USUARIOS=root
      - DB_PASS_USUARIOS=root
      - EUREKA_URL=http://eureka:8761/eureka/
      - KEYCLOAK_URL=http://keycloak:8080/realms/smartlogix
    depends_on:
      mysql-usuarios:
        condition: service_healthy
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - smartlogix-net

  frontend:
    build: ./Frontend/smartlogix-frontend
    container_name: smartlogix-frontend
    ports:
      - "3000:80"
    depends_on:
      - ms-inventario
      - ms-pedidos
      - ms-envios
    networks:
      - smartlogix-net

networks:
  smartlogix-net:
    driver: bridge
